<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ford - Optimized & Ad-Free</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
            
            /* Optimized for Chromebook rendering */
            -webkit-font-smoothing: antialiased;
            image-rendering: optimizeSpeed;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            
            /* Hardware acceleration hack */
            transform: translateZ(0);
            backface-visibility: hidden;
        }
        
        /* Hidden anti-ad overlay */
        #adKiller {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="adKiller"></div>
    
    <iframe
        src="https://dear.eilong.com/"
        sandbox="allow-scripts allow-same-origin allow-forms"
        allow="fullscreen"
        id="mainFrame"
        title="lucide">
    </iframe>

    <script src="script.js"></script>
</body>
</html>
