<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unrestricted In-Browser Proxy Engine</title>
    <style>
        :root {
            --bg-main: #11111b;
            --bg-browser: #1e1e2e;
            --bg-toolbar: #2b2b3a;
            --text-main: #cdd6f4;
            --border-color: #45475a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #browser-frame {
            width: 95vw;
            height: 90vh;
            background-color: var(--bg-browser);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        #toolbar {
            background-color: var(--bg-toolbar);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-btn {
            background: #313244;
            border: 1px solid var(--border-color);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .nav-btn:hover { background: #45475a; }

        .address-bar {
            flex-grow: 1;
            display: flex;
            align-items: center;
            background-color: var(--bg-browser);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 12px;
        }

        .proxy-tag {
            font-size: 11px;
            background-color: #f38ba8;
            color: #11111b;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 8px;
            font-weight: bold;
        }

        #url-input {
            width: 100%;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
        }

        #viewport-container {
            flex-grow: 1;
            background: #fff;
        }

        #webview {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }
    </style>
</head>
<body>

    <div id="browser-frame">
        <header id="toolbar">
            <button class="nav-btn" onclick="refreshPage()">↻</button>
            <div class="address-bar">
                <span class="proxy-tag">PROXY ACTIVE</span>
                <input type="text" id="url-input" placeholder="Enter URL (e.g., github.com) and press Enter...">
            </div>
        </header>
        <main id="viewport-container">
            <iframe id="webview" src="about:blank"></iframe>
        </main>
    </div>

    <script>
        // Point this to your backend proxy address
        const PROXY_SERVER = 'http://localhost:8080/';
        const urlInput = document.getElementById('url-input');
        const webview = document.getElementById('webview');

        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                navigateTo(urlInput.value);
            }
        });

        function navigateTo(url) {
            if (!url) return;
            
            // Clean up missing protocols
            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }

            urlInput.value = url;
            
            // Route the request THROUGH the proxy server to strip headers
            webview.src = PROXY_SERVER + url;
        }

        function refreshPage() {
            if (urlInput.value) navigateTo(urlInput.value);
        }

        // Initialize with a target site
        window.addEventListener('DOMContentLoaded', () => {
            navigateTo('https://github.com');
        });
    </script>
</body>
</html>
