<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSpace - Browser in Browser</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
    <div id="browser-container">
        <header id="tab-bar">
            <div class="window-dots">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <div id="tabs-wrapper">
                </div>
            <button id="new-tab-btn">+</button>
        </header>

        <nav id="nav-bar">
            <div class="nav-buttons">
                <button id="back-btn" disabled>←</button>
                <button id="forward-btn" disabled>→</button>
                <button id="refresh-btn">↻</button>
            </div>
            <div class="address-bar-container">
                <span class="security-lock">🔒</span>
                <input type="text" id="url-input" placeholder="Search or enter website URL (e.g., wikipedia.org)">
            </div>
        </nav>

        <main id="view-port">
            </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
