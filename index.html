<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ford - Optimized & Ad-Free</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
            /* Optimized for Chromebook rendering */
            -webkit-font-smoothing: antialiased;
            image-rendering: optimizeSpeed;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            /* Hardware acceleration hack */
            transform: translateZ(0);
            backface-visibility: hidden;
        }
        /* Hidden anti-ad overlay */
        #adKiller {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="adKiller"></div>
    <iframe
        src="https://dear.eilong.com/"
        sandbox="allow-scripts allow-same-origin allow-forms"
        allow="fullscreen"
        id="mainFrame"
        title="lucide">
    </iframe>

    <script>
        // Aggressive ad/popup blocker for school Chromebooks
        (function() {
            'use strict';
            
            // Kill common ad selectors
            const adSelectors = [
                'iframe[src*="ads"]', 'div[class*="ad"]', 'ins.adsbygoogle',
                'script[src*="ad"]', 'div[id*="ad"]', 'div[data-ad]',
                'a[href*="popup"]', 'div.popup', 'div.modal'
            ];
            
            function nukeAds() {
                adSelectors.forEach(selector => {
                    document.querySelectorAll(selector).forEach(el => {
                        el.remove();
                    });
                });
                
                // Block new popup windows
                window.open = function() {
                    console.warn('Popup blocked by adKiller.js');
                    return null;
                };
                
                // Override alert/confirm to prevent popups
                window.alert = function() {};
                window.confirm = function() { return true; };
            }
            
            // Run on load and continuously
            document.addEventListener('DOMContentLoaded', nukeAds);
            setInterval(nukeAds, 1000);
            
            // Optimize for Chromebook performance
            requestAnimationFrame(function optimize() {
                document.body.style.willChange = 'transform';
                requestAnimationFrame(optimize);
            });
        })();
    </script>
</body>
</html>
