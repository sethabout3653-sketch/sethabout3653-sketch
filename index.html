<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clever | Loading</title>
  <link rel="icon" href="https://clever.com/favicon.ico" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #faf9fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    :root {
      --blue: #3b82f6;
      --indigo: #485eec;
      --paper: #fbca6d;
      --book: #8f1ade;
      --bg: #faf9fb;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes bookFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.5px); }
    }

    @keyframes pencilTravel {
      0%   { left: 22px;  transform: translateY(0px) rotate(-18deg); }
      15%  { transform: translateY(-0.5px) rotate(-16deg); }
      45%  { transform: translateY(0px) rotate(-8deg); }
      55%  { transform: translateY(0px) rotate(-6deg); }
      85%  { transform: translateY(-0.5px) rotate(-10deg); }
      100% { left: 236px; transform: translateY(0px) rotate(-18deg); }
    }

    @keyframes lineGrow {
      0%   { transform: scaleX(0); opacity: 0; }
      8%   { opacity: 0.75; }
      100% { transform: scaleX(1); opacity: 0.75; }
    }

    @keyframes fadeOut {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.98); }
    }

    .loader {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: var(--bg);
      position: absolute;
      inset: 0;
      z-index: 20;
    }

    .clever-text {
      font-size: 64px;
      font-weight: 800;
      color: #5058f5;
      letter-spacing: -1.5px;
      margin-bottom: 28px;
      animation: fadeIn 0.6s ease-out;
      user-select: none;
    }

    .scene {
      position: relative;
      width: 280px;
      height: 110px;
      animation: bookFloat 3s ease-in-out infinite;
    }

    .book-base {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 280px;
      height: 12px;
      background: var(--book);
      border-radius: 0 0 6px 6px;
      box-shadow: 0 2px 8px rgba(143, 26, 222, 0.3);
    }

    .page-left {
      position: absolute;
      bottom: 12px;
      left: 6px;
      width: 132px;
      height: 50px;
      background: var(--paper);
      border-radius: 2px 0 0 0;
      transform: skewY(-1.5deg);
      transform-origin: bottom left;
    }

    .page-right {
      position: absolute;
      bottom: 12px;
      right: 6px;
      width: 132px;
      height: 50px;
      background: var(--paper);
      border-radius: 0 2px 0 0;
      transform: skewY(1.5deg);
      transform-origin: bottom right;
    }

    .crease {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 50px;
      background: rgba(0, 0, 0, 0.06);
      z-index: 2;
    }

    .line-track {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 34px;
      height: 4px;
      overflow: hidden;
      z-index: 4;
    }

    .draw-line {
      position: absolute;
      left: 0;
      top: 1px;
      width: 236px;
      height: 2px;
      background: var(--blue);
      border-radius: 999px;
      transform-origin: left center;
      animation: lineGrow 2.6s linear infinite;
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.03);
    }

    .pencil-wrap {
      position: absolute;
      top: 2px;
      left: 22px;
      z-index: 10;
      animation: pencilTravel 2.6s linear infinite;
      will-change: left, transform;
    }

    .pencil-body {
      width: 14px;
      height: 46px;
      background: var(--indigo);
      border-radius: 2px;
      position: relative;
      transform: rotate(-22deg);
      transform-origin: bottom center;
      box-shadow: 0 2px 5px rgba(72, 94, 236, 0.16);
    }

    .pencil-eraser {
      position: absolute;
      top: -7px;
      left: 0;
      width: 14px;
      height: 7px;
      background: #ff5a6f;
      border-radius: 3px 3px 0 0;
    }

    .pencil-metal {
      position: absolute;
      top: 0;
      left: 0;
      width: 14px;
      height: 4px;
      background: #c8cdd8;
    }

    .pencil-wood {
      position: absolute;
      bottom: -12px;
      left: 0;
      width: 0;
      height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 12px solid #f5d0a0;
    }

    .pencil-tip {
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 3px solid transparent;
      border-right: 3px solid transparent;
      border-top: 5px solid #1a1a2e;
    }

    .pencil-wrap::after {
      content: "";
      position: absolute;
      left: -8px;
      top: 18px;
      width: 10px;
      height: 2px;
      background: rgba(59, 130, 246, 0.45);
      border-radius: 999px;
      transform: rotate(-2deg);
      animation: lineGrow 2.6s linear infinite;
    }

    .app {
      position: absolute;
      inset: 0;
      display: none;
      background: #fff;
      z-index: 5;
    }

    .app iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: white;
    }

    .fallback {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 16px;
      color: #666;
      padding: 24px;
      text-align: center;
      background: white;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="clever-text">Clever</div>

    <div class="scene">
      <div class="book-base"></div>
      <div class="page-left"></div>
      <div class="page-right"></div>
      <div class="crease"></div>

      <div class="line-track">
        <div class="draw-line"></div>
      </div>

      <div class="pencil-wrap">
        <div class="pencil-body">
          <div class="pencil-eraser"></div>
          <div class="pencil-metal"></div>
          <div class="pencil-wood"></div>
          <div class="pencil-tip"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="app" id="app">
    <iframe id="siteFrame" title="Embedded website"></iframe>
    <div class="fallback" id="fallback" style="display:none;">
      This website cannot be embedded if it blocks iframes.<br />
      Replace the URL in the script with a page that allows embedding.
    </div>
  </div>

  <script>
    // Change this to the website you want to load.
    // Many sites block being shown inside an iframe.
    const EMBED_URL = "https://classroom.poloniacruz.com/";

    const loader = document.getElementById("loader");
    const app = document.getElementById("app");
    const frame = document.getElementById("siteFrame");
    const fallback = document.getElementById("fallback");

    setTimeout(() => {
      loader.style.animation = "fadeOut 0.35s ease forwards";
      setTimeout(() => {
        loader.style.display = "none";
        app.style.display = "block";
        frame.src = EMBED_URL;

        frame.addEventListener("load", () => {
          fallback.style.display = "none";
        });

        // If the iframe is blocked or fails silently, show a fallback message.
        setTimeout(() => {
          if (!frame.contentWindow || frame.contentWindow.location.href === "about:blank") {
            fallback.style.display = "grid";
          }
        }, 1800);
      }, 320);
    }, 3000);
  </script>
</body>
</html>
