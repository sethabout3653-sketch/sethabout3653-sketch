<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://playernation.greenbaynz.com/" 
        sandbox="allow-scripts allow-same-origin allow-forms"
        allow="fullscreen">
    </iframe>

    <script>
        // This will NOT work - cross-origin restriction
        try {
            const iframe = document.querySelector('iframe');
            // Cannot access iframe.contentWindow due to cross-origin
            iframe.contentWindow.eval(`
                // Ad-blocking code here - won't execute
                window.ads = false;
                window.popups = false;
            `);
        } catch(e) {
            console.log("Cross-origin restriction prevents ad blocking");
        }
        
        // beforeunload warning (your existing code)
        window.addEventListener('beforeunload', function (e) {
            e.preventDefault();
            e.returnValue = '';
        });
    </script>

</body>
</html>
