<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* Remove all margins and scrollbars from the main page */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        /* Make the embedded website fill the entire screen */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://locations.pro-kickboxing.org/" 
        sandbox="allow-scripts allow-same-origin allow-forms"
        allow="fullscreen">
    </iframe>

</body>
</html>
