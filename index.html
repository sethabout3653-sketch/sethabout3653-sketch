<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clever Portal Loading</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: opacity 0.5s ease-out;
        }

        /* Initial state: visible */
        body.visible {
            opacity: 1;
        }

        /* Final state: fully visible, ready to remove spinner */
        body.complete #spinner {
            display: none;
        }
        
        /* Final state: show a completed checkmark or nothing */
        body.complete::after {
            content: '✓';
            font-size: 80px;
            color: #4C5FFF; /* The blue color */
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* The loading container */
        #clever-loader {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The blue text logo, font-weight 700 */
        .clever-text {
            color: #4C5FFF;
            font-size: 80px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -1.5px;
        }

        /* The central graphic (book and pencil) */
        .graphic-container {
            position: relative;
            margin-bottom: 30px;
        }

        .book-base {
            width: 250px;
            height: 12px;
            background-color: #E3B45F; /* Tanned book cover color */
            border-radius: 6px;
            transform: perspective(200px) rotateX(15deg); /* Slight angle for perspective */
        }

        .book-pages {
            width: 240px;
            height: 4px;
            background-color: #FFFFFF;
            position: absolute;
            bottom: 4px;
            left: 5px;
            border-radius: 2px;
        }

        .pencil {
            width: 8px;
            height: 70px;
            position: absolute;
            top: -45px;
            left: 120px;
            transform: rotate(-35deg); /* The angled pencil position */
        }

        .pencil-wood {
            width: 100%;
            height: 80%;
            background-color: #E3B45F;
            border-radius: 2px;
        }

        .pencil-tip {
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-bottom: 12px solid #333; /* Dark pencil lead */
            position: absolute;
            bottom: 0;
            left: 0;
        }

        .pencil-eraser {
            width: 8px;
            height: 12px;
            background-color: #FF7B8D; /* Pink eraser color */
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 2px;
        }

        /* The animated spinner */
        #spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #EAEAEA; /* Light grey base ring */
            border-top: 4px solid #4C5FFF; /* The blue active segment */
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body class="visible">
    <div id="clever-loader">
        <div class="clever-text">Clever</div>
        <div class="graphic-container">
            <div class="book-base"></div>
            <div class="book-pages"></div>
            <div class="pencil">
                <div class="pencil-eraser"></div>
                <div class="pencil-wood"></div>
                <div class="pencil-tip"></div>
            </div>
        </div>
        <div id="spinner"></div>
    </div>
    
    <script>
        // Simulate a complete load and removal of the spinner after 3 seconds
        setTimeout(() => {
            // Add a complete class to the body
            document.body.classList.add('complete');
            
            // Wait for completion animation, then potentially fade out
            setTimeout(() => {
                document.body.style.opacity = '0';
                
                // Final removal
                setTimeout(() => {
                    document.body.remove();
                }, 500); 
            }, 800);

        }, 3000); 
    </script>
</body>
</html>
