<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Ad Annihilator</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://cdn.jsdelivr.net/gh/lucideproxy/svg@latest/logo.svg#/" 
        sandbox="allow-scripts allow-same-origin allow-forms"
        allow="fullscreen"
        id="mainFrame">
    </iframe>

    <script>
        // Block accidental tab closing
        window.addEventListener('beforeunload', function (e) {
            e.preventDefault();
            e.returnValue = '';
        });

        // The ultimate ad/popup/tracker annihilator script (to inject into EVERY frame)
        const universalAdKiller = `
            console.log('☢️ Universal Ad & Popup Nuker Activated — Fuck all ads, everywhere.');
            
            // Override window.open globally to kill popups
            const originalOpen = window.open;
            window.open = function() {
                console.warn('🚫 Popup blocked: Go fuck yourself.');
                return null;
            };

            // Block annoying dialogs
            window.alert = function() { console.warn('Alert blocked.'); };
            window.confirm = function() { console.warn('Confirm blocked.'); return false; };
            window.prompt = function() { console.warn('Prompt blocked.'); return null; };

            // MutationObserver to nuke ad elements dynamically
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    mutation.addedNodes.forEach(function(node) {
                        if (node.nodeType === 1) {
                            // Check for ads by class, id, or src
                            const className = (node.className || '').toLowerCase();
                            const id = (node.id || '').toLowerCase();
                            const src = (node.src || '').toLowerCase();
                            const adPatterns = ['ad', 'banner', 'popup', 'overlay', 'advert', 'sponsor', 'track', 'analytics'];
                            
                            if (adPatterns.some(pattern => 
                                className.includes(pattern) || 
                                id.includes(pattern) || 
                                src.includes(pattern)
                            )) {
                                node.remove();
                                console.log('🗑️ Nuked ad element:', node);
                            }
                        }
                    });
                });
            });

            observer.observe(document.documentElement, {
                childList: true,
                subtree: true
            });

            // Block known ad/tracker scripts
            const blockedDomains = [
                'googlesyndication',
                'doubleclick',
                'facebook.net',
                'analytics',
                'adsystem',
                'tracking',
                'adserver',
                'scorecardresearch',
                'amazon-adsystem',
                'outbrain',
                'taboola'
            ];
            document.addEventListener('DOMNodeInserted', function(e) {
                if (e.target.tagName === 'SCRIPT' && e.target.src) {
                    const src = e.target.src.toLowerCase();
                    if (blockedDomains.some(domain => src.includes(domain))) {
                        e.target.remove();
                        console.log('🚫 Blocked tracker script:', src);
                    }
                }
            });

            // Periodic cleanup for leftover ad elements
            setInterval(function() {
                const adSelectors = [
                    'iframe[src*="ad"]', 'img[src*="ad"]', 'div[class*="ad"]',
                    'div[id*="ad"]', 'ins', 'embed', 'object'
                ];
                adSelectors.forEach(selector => {
                    document.querySelectorAll(selector).forEach(el => el.remove());
                });
            }, 1500);

            // Recursively inject this script into any new iframes that appear
            const injectIntoIframes = function() {
                document.querySelectorAll('iframe').forEach(iframe => {
                    try {
                        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                        if (iframeDoc && !iframeDoc.querySelector('script[data-injected="true"]')) {
                            const script = iframeDoc.createElement('script');
                            script.setAttribute('data-injected', 'true');
                            script.textContent = universalAdKiller;
                            iframeDoc.head.appendChild(script);
                            console.log('💉 Injected ad-killer into nested iframe.');
                        }
                    } catch (e) {
                        // Cross-origin iframes might throw errors, fuck 'em
                    }
                });
            };

            // Watch for new iframes and inject the killer script
            const iframeObserver = new MutationObserver(injectIntoIframes);
            iframeObserver.observe(document.body, { childList: true, subtree: true });
            injectIntoIframes(); // Initial injection
        `;

        // Inject the universal killer into the main iframe on load
        document.getElementById('mainFrame').addEventListener('load', function() {
            try {
                const iframeDoc = this.contentDocument || this.contentWindow.document;
                const script = iframeDoc.createElement('script');
                script.textContent = universalAdKiller;
                iframeDoc.head.appendChild(script);
                console.log('💀 Universal ad annihilator injected into main frame.');
            } catch (e) {
                console.error('Failed to inject into main frame (cross-origin?):', e);
            }
        });

        // Also try to inject into any dynamically created frames in the parent
        const parentObserver = new MutationObserver(function() {
            document.querySelectorAll('iframe').forEach(iframe => {
                if (!iframe.hasAttribute('data-injected')) {
                    iframe.setAttribute('data-injected', 'true');
                    iframe.addEventListener('load', function() {
                        try {
                            const iframeDoc = this.contentDocument || this.contentWindow.document;
                            const script = iframeDoc.createElement('script');
                            script.textContent = universalAdKiller;
                            iframeDoc.head.appendChild(script);
                        } catch (e) {
                            // Silently fail on cross-origin
                        }
                    });
                }
            });
        });
        parentObserver.observe(document.body, { childList: true, subtree: true });
    </script>

</body>
</html>
