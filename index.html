<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In-Browser Web Wrapper</title>
    <style>
        :root {
            --bg-main: #0f0f14;
            --bg-browser: #16161f;
            --bg-toolbar: #22222e;
            --text-main: #e1e1e6;
            --border-color: #38384d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #browser-frame {
            width: 96vw;
            height: 92vh;
            background-color: var(--bg-browser);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        #toolbar {
            background-color: var(--bg-toolbar);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-btn {
            background: #2d2d3d;
            border: 1px solid var(--border-color);
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-btn:hover { background: #44445c; }

        .address-bar {
            flex-grow: 1;
            display: flex;
            align-items: center;
            background-color: var(--bg-browser);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 12px;
        }

        .proxy-status {
            font-size: 11px;
            background-color: #a6e3a1;
            color: #11111b;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 10px;
            font-weight: bold;
            white-space: nowrap;
        }

        #url-input {
            width: 100%;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
        }

        #viewport-container {
            flex-grow: 1;
            background: #fff;
            position: relative;
        }

        #webview {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        #loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(22, 22, 31, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div id="browser-frame">
        <header id="toolbar">
            <button class="nav-btn" onclick="refreshPage()">↻</button>
            <div class="address-bar">
                <span class="proxy-status" id="proxy-indicator">CLIENT PROXY ACTIVE</span>
                <input type="text" id="url-input" placeholder="Enter web address (e.g. github.com) and hit Enter...">
            </div>
        </header>
        <main id="viewport-container">
            <iframe id="webview"></iframe>
            <div id="loading-overlay">Rendering unblocked page content...</div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('url-input');
        const webview = document.getElementById('webview');
        const loader = document.getElementById('loading-overlay');

        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                navigateTo(urlInput.value);
            }
        });

        async function navigateTo(targetUrl) {
            if (!targetUrl) return;
            
            loader.style.display = 'flex';

            // Ensure uniform protocol structure
            if (!/^https?:\/\//i.test(targetUrl)) {
                targetUrl = 'https://' + targetUrl;
            }
            urlInput.value = targetUrl;

            try {
                // Use AllOrigins public worker to fetch the cross-origin source string purely client-side
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                const response = await fetch(proxyUrl);
                
                if (!response.ok) throw new Error('Proxy unreachable');
                const data = await response.json();

                // Inject the raw web data directly into the iframe window, cleanly avoiding cross-origin header rules
                const doc = webview.contentWindow.document || webview.contentDocument;
                doc.open();
                
                // Inject a base target reference tag so internal relative links inside GitHub/Wikipedia don't break
                const baseTag = `<base href="${targetUrl}/" target="_self">`;
                doc.write(baseTag + data.contents);
                doc.close();

            } catch (err) {
                console.error("Proxy Load Error:", err);
                // Fallback direct load if proxy API hits rate limits
                webview.src = targetUrl;
            } finally {
                loader.style.display = 'none';
            }
        }

        function refreshPage() {
            if (urlInput.value) navigateTo(urlInput.value);
        }

        // Default home page on startup
        window.addEventListener('DOMContentLoaded', () => {
            navigateTo('https://wikipedia.org');
        });
    </script>
</body>
</html>
