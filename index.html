<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading…</title>
  <link id="dynamic-favicon" rel="icon" type="image/png" href="">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      font-family: sans-serif;
    }
    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>

  <script>
  // popup-redirect-blocker.js
  (() => {
    'use strict';

    const originalOpen = window.open;
    const suspiciousProtocols = /^(javascript:|data:|vbscript:)/i;
    const suspiciousWindowNames = /^(popup|ad|ads|redirect|redir|blank)?$/i;

    function isSuspiciousUrl(url) {
      if (!url || typeof url !== 'string') return false;
      return suspiciousProtocols.test(url.trim());
    }

    function isLikelyPopupFeatures(features) {
      if (!features) return false;
      const f = String(features).toLowerCase();
      return /(?:^|,)\s*(width|height|left|top|menubar|toolbar|location|status|resizable|scrollbars)\s*=/.test(f);
    }

    window.open = function(url, target, features) {
      try {
        if (isSuspiciousUrl(url)) return null;
        if (isLikelyPopupFeatures(features)) return null;
        if (target && suspiciousWindowNames.test(String(target))) return null;
        return originalOpen.apply(this, arguments);
      } catch {
        return null;
      }
    };

    const blockEvent = (e) => {
      const t = e.target;
      if (!t) return;

      const href = t.closest?.('a')?.getAttribute?.('href');
      if (href && isSuspiciousUrl(href)) {
        e.preventDefault();
        e.stopImmediatePropagation();
        return;
      }

      const anchor = t.closest?.('a[target="_blank"]');
      if (anchor) {
        const rel = anchor.getAttribute('rel') || '';
        if (!/noopener|noreferrer/i.test(rel)) {
          anchor.setAttribute('rel', 'noopener noreferrer');
        }
      }
    };

    ['click', 'auxclick', 'mousedown', 'keydown'].forEach(evt => {
      document.addEventListener(evt, blockEvent, true);
    });

    const origAssign = Location.prototype.assign;
    const origReplace = Location.prototype.replace;

    Location.prototype.assign = function(url) {
      if (isSuspiciousUrl(url)) return;
      return origAssign.call(this, url);
    };

    Location.prototype.replace = function(url) {
      if (isSuspiciousUrl(url)) return;
      return origReplace.call(this, url);
    };

    window.popupRedirectBlocker = {
      enabled: true,
      restore() {
        window.open = originalOpen;
        Location.prototype.assign = origAssign;
        Location.prototype.replace = origReplace;
        document.removeEventListener('click', blockEvent, true);
        document.removeEventListener('auxclick', blockEvent, true);
        document.removeEventListener('mousedown', blockEvent, true);
        document.removeEventListener('keydown', blockEvent, true);
        this.enabled = false;
      }
    };
  })();
  </script>

  <script>
    const iframeUrl = "https://topsaugatr.analisismx.xyz/";
    const iframeTitleFallback = "topsaugatr.analisismx.xyz";
    const iframeFaviconFallback = "";

    function setPageTitle(title) {
      document.title = title || iframeTitleFallback;
    }

    function setFavicon(href) {
      const link = document.getElementById("dynamic-favicon");
      if (!link) return;
      link.setAttribute("href", href || iframeFaviconFallback || "");
    }

    // Default values until the embedded page sends its real title/icon.
    setPageTitle(iframeTitleFallback);

    // Listen for the embedded page to send title/favicon updates.
    window.addEventListener("message", (event) => {
      if (event.origin !== new URL(iframeUrl).origin) return;
      const data = event.data;
      if (!data || typeof data !== "object") return;

      if (data.type === "setMeta") {
        if (typeof data.title === "string") setPageTitle(data.title);
        if (typeof data.favicon === "string") setFavicon(data.favicon);
      }
    });

    window.addEventListener("DOMContentLoaded", () => {
      setFavicon(iframeFaviconFallback);
    });
  </script>

</head>
<body>
  <iframe
    src="https://topsaugatr.analisismx.xyz/"
    allow="fullscreen"
    loading="lazy"
    referrerpolicy="no-referrer"
  ></iframe>
</body>
</html>
