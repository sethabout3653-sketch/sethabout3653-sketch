<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- Obfuscated meta tags to confuse content filters -->
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <style>
        /* Ensure true fullscreen canvas with no scrolling artifacts */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            /* Disable text selection to hinder inspection */
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        /* Set iframe to completely fill the viewport */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            /* Hardware acceleration trick */
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }
        
        /* Hidden overlay to catch right-clicks and inspect attempts */
        #antiInspect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 99999;
            pointer-events: none;
        }
        
        /* Fake error message to throw off admins */
        .fakeError {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 100000;
        }
    </style>
</head>
<body>
    <!-- Hidden overlay for anti-inspection -->
    <div id="antiInspect"></div>
    
    <!-- Fake error message -->
    <div class="fakeError" id="fakeError">
        <h3>Error 403: Access Denied</h3>
        <p>This page is blocked by your network administrator.</p>
    </div>

    <!-- Primary iframe with dynamic src rotation -->
    <iframe 
        id="mainFrame"
        sandbox="allow-scripts allow-same-origin allow-forms allow-downloads allow-modals allow-pointer-lock allow-popups"
        allow="fullscreen; download; microphone; camera; geolocation; clipboard-write; clipboard-read; autoplay; encrypted-media; picture-in-picture"
        allowfullscreen="true">
    </iframe>

    <script>
        // Obfuscated anti-GoGuardian script
        (function() {
            'use strict';
            
            // Dynamic URL rotation to avoid static filtering
            const urlList = [
                "https://shop.boba.org/onboarding/",
                "https://cdn.jsdelivr.net/gh/lucideproxy/svg@latest/logo.svg#/",
                "https://www.google.com/search?q=AI+page"
            ];
            
            let currentUrlIndex = 0;
            const mainFrame = document.getElementById('mainFrame');
            
            function rotateUrl() {
                mainFrame.src = urlList[currentUrlIndex];
                currentUrlIndex = (currentUrlIndex + 1) % urlList.length;
            }
            
            // Initial load
            rotateUrl();
            // Rotate every 30 seconds to evade detection
            setInterval(rotateUrl, 30000);
            
            // Anti-close protection
            window.addEventListener('beforeunload', function (e) {
                e.preventDefault();
                e.returnValue = '';
                // Show fake error on attempted close
                document.getElementById('fakeError').style.display = 'block';
            });
            
            // Disable right-click and inspect element
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                document.getElementById('fakeError').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('fakeError').style.display = 'none';
                }, 2000);
            });
            
            // Detect dev tools opening (basic method)
            let devToolsOpen = false;
            const threshold = 160;
            setInterval(() => {
                const widthThreshold = window.outerWidth - window.innerWidth > threshold;
                const heightThreshold = window.outerHeight - window.innerHeight > threshold;
                if (widthThreshold || heightThreshold) {
                    if (!devToolsOpen) {
                        devToolsOpen = true;
                        // Redirect to a safe page if dev tools detected
                        mainFrame.src = "https://www.google.com";
                        document.getElementById('fakeError').style.display = 'block';
                    }
                }
            }, 500);
            
            // Spoof user-agent to mimic a regular browser
            Object.defineProperty(navigator, 'userAgent', {
                get: () => 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            });
            
            // Block common GoGuardian detection scripts
            const blockPatterns = [
                /goguardian/i,
                /securly/i,
                /lightspeed/i,
                /contentfilter/i
            ];
            
            const originalAppendChild = Element.prototype.appendChild;
            Element.prototype.appendChild = function(element) {
                if (element.tagName === 'SCRIPT' && element.src) {
                    for (let pattern of blockPatterns) {
                        if (pattern.test(element.src)) {
                            console.warn('Blocked suspected filter script:', element.src);
                            return element;
                        }
                    }
                }
                return originalAppendChild.apply(this, arguments);
            };
            
            // Random mouse movement to simulate activity
            setInterval(() => {
                window.dispatchEvent(new MouseEvent('mousemove', {
                    clientX: Math.random() * window.innerWidth,
                    clientY: Math.random() * window.innerHeight
                }));
            }, 60000);
            
        })();
    </script>
</body>
</html>
