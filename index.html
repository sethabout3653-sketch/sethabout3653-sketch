<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title>
    
    <!-- Favicon Support for GitHub Pages -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">

    <style>
        /* Reset margins and hide scrollbars to ensure a full-screen embed */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        /* Make the iframe fill the entire viewport seamlessly */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- 
      Secure Sandbox Configured for GitHub Deployment:
      Omit 'allow-popups' and 'allow-top-navigation' to lock down aggressive ads/popups.
    -->
    <iframe 
        src="https://cdn.jsdelivr.net/gh/lucideproxy/svg@latest/logo.svg#" 
        sandbox="allow-scripts allow-same-origin allow-forms"
        allow="fullscreen">
    </iframe>

</body>
</html>
