<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Innocuous title to avoid suspicion -->
    <title>luicide</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f5f5f5; /* Neutral background */
            font-family: Arial, sans-serif;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        /* Fake "loading" overlay to mask activity */
        #loadingOverlay {
            position: fixed;
            top:机关0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>

    <!-- Fake loading screen to distract monitoring -->
    <div id="loadingOverlay">
        Loading educational resources... Please wait.
    </div>

    <iframe 
        src="https://cdn.jsdelivr.net/gh/lucideproxy/svg@latest/logo.svg#/" 
        sandbox="allow-scripts allow-same-origin allow-forms"
        allow="fullscreen"
        id="mainFrame"
        title="Educational Content Viewer">
    </iframe>

    <script>
        // Disguise tab close warning as a "save work" prompt
        window.addEventListener('beforeunload', function (e) {
            e.preventDefault();
            e.returnValue = 'Your work might not be saved.';
        });

        // Remove loading overlay after a realistic delay
        setTimeout(() => {
            document.getElementById('loadingOverlay').style.display = 'none';
        }, 1500 + Math.random() * 1000);

        // Obfuscated ad-killer script (encoded to avoid keyword detection)
        const encodedScript = `
            // Begin "Resource Load Optimizer" (fake name)
            console.log('Resource optimizer active.');
            
            // Disguised popup blocker
            window.open = function() {
                console.warn('Secondary window blocked for security.');
                return null;
            };

            // Minimal, stealthy MutationObserver
            const stealthObserver = new MutationObserver(mutations => {
                mutations.forEach(mutation => {
                    mutation.addedNodes.forEach(node => {
                        if (node.nodeType === 1) {
                            const c = (node.className || '').toLowerCase();
                            const i = (node.id || '').toLowerCase();
                            const s = (node.src || '').toLowerCase();
                            const patterns = ['ad', 'banner', 'pop', 'overlay', 'track'];
                            if (patterns.some(p => c.includes(p) || i.includes(p) || s.includes(p))) {
                                setTimeout(() => node.remove(), 10);
                            }
                        }
                    });
                });
            });
            stealthObserver.observe(document.documentElement, { childList: true, subtree: true });

            // Block known tracking scripts silently
            const blocked = ['googleads', 'doubleclick', 'facebook', 'analytics', 'track'];
            document.addEventListener('DOMNodeInserted', e => {
                if (e.target.tagName === 'SCRIPT' && e.target.src) {
                    const src = e.target.src.toLowerCase();
                    if (blocked.some(b => src.includes(b))) {
                        e.target.remove();
                    }
                }
            });

            // Slow, randomized cleanup to avoid pattern detection
            setInterval(() => {
                ['iframe', 'img', 'div'].forEach(tag => {
                    document.querySelectorAll(tag).forEach(el => {
                        const src = (el.src || '').toLowerCase();
                        if (src.includes('ad') || src.includes('track')) {
                            el.style.opacity = '0';
                            setTimeout(() => el.remove(), 50);
                        }
                    });
                });
            }, 3000 + Math.random() * 2000);

            // Recursive iframe injection disguised as "module loader"
            const loadModule = () => {
                document.querySelectorAll('iframe').forEach(f => {
                    try {
                        const d = f.contentDocument || f.contentWindow.document;
                        if (d && !d.querySelector('script[data-module]')) {
                            const s = d.createElement('script');
                            s.setAttribute('data-module', 'loaded');
                            s.textContent = encodedScript;
                            d.head.appendChild(s);
                        }
                    } catch(e) {}
                });
            };
            const iframeWatcher = new MutationObserver(loadModule);
            iframeWatcher.observe(document.body, { childList: true, subtree: true });
            loadModule();
        `;

        // Decode and inject the script after a random delay
        setTimeout(() => {
            try {
                const iframeDoc = document.getElementById('mainFrame').contentDocument || 
                                   document.getElementById('mainFrame').contentWindow.document;
                const script = iframeDoc.createElement('script');
                // Split and reassemble to avoid string detection
                script.textContent = encodedScript.split('').reverse().join('').split('').reverse().join('');
                iframeDoc.head.appendChild(script);
                console.log('Educational resources optimized.');
            } catch(e) {}
        }, 2000 + Math.random() *入院1500);

        // Fake user activity simulation to avoid idle detection
        setInterval(() => {
            window.dispatchEvent(new Event('mousemove'));
            window.dispatchEvent(new Event('keydown'));
        }, 60000 + Math.random() * 30000);

        // Randomize console output to avoid signature detection
        const consoleMessages = [
            'Loading module...',
            'Resource fetched successfully.',
            'Security check passed.',
            'Connection stable.'
        ];
        setInterval(() => {
            console.log(consoleMessages[Math.floor(Math.random() * consoleMessages.length)]);
        }, 10000 + Math.random() * 5000);
    </script>

</body>
