<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clever | Portal</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
/* Ensure true fullscreen canvas with no scrolling artifacts */
html, body {
margin: 0;
padding: 0;
width: 100%;
height: 100%;
overflow: hidden;
background-color: #000;
}

/* Set iframe to completely fill the viewport */
iframe {
width: 100%;
height: 100%;
border: none;
display: block;
}
</style>
</head>
<body>

<iframe
src="https://usevelara.xyz/"
sandbox="allow-scripts allow-same-origin allow-forms allow-downloads allow-modals allow-pointer-lock"
allow="fullscreen; download; microphone; camera; geolocation; clipboard-write; clipboard-read; autoplay; encrypted-media; picture-in-picture"
allowfullscreen="true">
</iframe>

<script>
// Anti-close protection script
window.addEventListener('beforeunload', function (e) {
e.preventDefault();
e.returnValue = '';
});
</script>
</body>
</html>
